<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <base href="https://chatbotv1-sigma.vercel.app/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KYOU Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrapper">
    <div class="phone-shell">

      <header class="chat-header" id="chat-header">
        <div class="header-center">
          <div class="avatar-wrap">
            <div class="avatar">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
                <circle cx="11" cy="8" r="4" fill="currentColor" opacity="0.9"/>
                <path d="M3 19c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
              </svg>
            </div>
            <span class="online-dot" aria-label="Online"></span>
          </div>
          <div class="header-info">
            <span class="header-name">KI-Assistent</span>
            <span class="header-sub">KYOU · Online</span>
          </div>
        </div>
        <div class="header-spacer"></div>
      </header>

      <main class="messages-area" id="messages-area" role="log" aria-live="polite" aria-label="Chat-Verlauf"></main>

      <div class="input-bar" id="input-bar">
        <div class="input-wrap">
          <textarea
            id="chat-input"
            class="chat-input"
            placeholder="Nachricht…"
            rows="1"
            autocomplete="off"
            autocorrect="on"
            spellcheck="true"
            aria-label="Nachricht eingeben"
          ></textarea>
          <button class="send-btn" id="send-btn" aria-label="Senden" disabled>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle cx="10" cy="10" r="10" fill="currentColor"/>
              <path d="M6.5 10.5 10 7l3.5 3.5M10 7v8" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="home-indicator" aria-hidden="true"></div>
      </div>

    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
